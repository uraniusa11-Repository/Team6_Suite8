name: Playwright Tests (New Manual)
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: true
        default: 'main'
      project:
        description: 'Playwright project (e.g. bdd chrome, bdd firefox, bdd webkit)'
        required: false
        default: 'bdd chrome'
      grep:
        description: 'Test filter (e.g. Dashlets, Home Page, Lead)'
        required: false
        default: ''
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      SUITE_USERNAME: ${{ secrets.SUITE_USERNAME }}
      SUITE_PASSWORD: ${{ secrets.SUITE_PASSWORD }}
      SUITE_URL: ${{ secrets.SUITE_URL }}
      CI: true
      LOG_CONSOLE: false
      LOG_LEVEL: error
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Cache Playwright browsers
      uses: actions/cache@v4
      id: playwright-cache
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install chromium --with-deps
    - name: Install system dependencies
      if: steps.playwright-cache.outputs.cache-hit == 'true'
      run: npx playwright install-deps
    - name: Generate BDD specs
      run: npx bddgen
    - name: Run Playwright tests
      run: npx playwright test --project=${{ github.event.inputs.project }} --grep "${{ github.event.inputs.grep }}" --reporter=html
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
