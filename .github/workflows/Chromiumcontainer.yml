name: Playwright Tests (Chromium - Container)
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run tests on'
        required: true
        default: 'main'
      project:
        description: 'Playwright project to run (e.g. setup, bdd)'
        required: false
        default: 'bdd'
      grep:
        description: 'Test filter (e.g. Home Page, Login, Dashlets)'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
      options: --user 1001
    env:
      SUITE_USERNAME: ${{ secrets.SUITE_USERNAME }}
      SUITE_PASSWORD: ${{ secrets.SUITE_PASSWORD }}
      SUITE_URL: ${{ secrets.SUITE_URL }}
      CI: true
      LOG_CONSOLE: false
      LOG_LEVEL: error
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.branch }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Generate BDD specs
      run: npx bddgen

    - name: Start virtual display
      run: Xvfb :99 -screen 0 1280x720x24 &

    - name: Run Playwright tests
      env:
        DISPLAY: :99
      run: npx playwright test --project=setup --project=${{ inputs.project }} --headed --grep "${{ inputs.grep }}" --reporter=html

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
